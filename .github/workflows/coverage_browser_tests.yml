name: Coverage (Browser tests)
on:
  push:
    paths:
      - 'gulpfile.mjs'
      - 'external/**'
      - 'src/**'
      - 'test/images/**'
      - 'test/pdfs/**'
      - 'test/resources/**'
      - 'test/*.css'
      - 'test/driver.js'
      - 'test/test.mjs'
      - 'test/test_manifest.json'
      - 'test/test_slave.html'
      - 'web/**'
      - '.github/workflows/coverage_browser_tests.yml'
    branches:
      - master
  pull_request:
    paths:
      - 'gulpfile.mjs'
      - 'external/**'
      - 'src/**'
      - 'test/images/**'
      - 'test/pdfs/**'
      - 'test/resources/**'
      - 'test/*.css'
      - 'test/driver.js'
      - 'test/test.mjs'
      - 'test/test_manifest.json'
      - 'test/test_slave.html'
      - 'web/**'
      - '.github/workflows/coverage_browser_tests.yml'
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / firefox

    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    environment: code-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore cached PDF files
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test/pdfs/*.pdf
          key: cached-pdf-files-${{ hashFiles('test/pdfs/*.pdf') }}
          restore-keys: |
            cached-pdf-files-
          enableCrossOsArchive: true

      - name: Run browser tests with code coverage
        run: npx gulp botbrowsertest --headless -j$(nproc) --coverage --coverage-output build/coverage/browser --noChrome

      - name: Save cached PDF files
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test/pdfs/*.pdf
          key: cached-pdf-files-${{ hashFiles('test/pdfs/*.pdf') }}
          enableCrossOsArchive: true

      - name: Upload results to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: ./build/coverage/browser/lcov.info
          flags: browsertest
          name: codecov-umbrella
          disable_search: true
          disable_telem: true
          verbose: true
