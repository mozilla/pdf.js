name: Unit tests
on:
  push:
    paths:
      - "gulpfile.mjs"
      - "src/**"
      - "test/test.mjs"
      - "test/test_manifest.json"
      - "test/unit/**"
      - "test/pdfs/**"
      - "web/**"
      - ".github/workflows/fetch_pdfs.yml"
      - ".github/workflows/unit_tests.yml"
    branches:
      - master
  pull_request:
    paths:
      - "gulpfile.mjs"
      - "src/**"
      - "test/test.mjs"
      - "test/test_manifest.json"
      - "test/unit/**"
      - "test/pdfs/**"
      - "web/**"
      - ".github/workflows/fetch_pdfs.yml"
      - ".github/workflows/unit_tests.yml"
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: read

jobs:
  fetch-pdfs:
    uses: ./.github/workflows/fetch_pdfs.yml
    secrets:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  test:
    name: ${{ matrix.os }} / ${{ matrix.browser }}
    needs: fetch-pdfs

    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*]
        os: [windows-latest, ubuntu-latest]
        browser: [firefox, chrome]
        include:
          - browser: firefox
            skip: --noChrome
          - browser: chrome
            skip: --noFirefox

    runs-on: ${{ matrix.os }}
    environment: code-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          sparse-checkout: |
            /*
            !test/pdfs/*.pdf
          sparse-checkout-cone-mode: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore cached PDF test files
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test/pdfs/*.pdf
          key: ${{ needs.fetch-pdfs.outputs.cache-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Run unit tests with code coverage
        run: npx gulp unittest --headless --coverage --coverage-output build/coverage/unit ${{ matrix.skip }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: ./build/coverage/unit/lcov.info
          flags: unittest
          name: codecov-umbrella
          disable_search: true
          disable_telem: true
          verbose: true
