name: Font tests
on:
  push:
    paths:
      - 'gulpfile.mjs'
      - 'src/**'
      - 'test/test.mjs'
      - 'test/font/**'
      - '.github/workflows/font_tests.yml'
    branches:
      - master
  pull_request:
    paths:
      - 'gulpfile.mjs'
      - 'src/**'
      - 'test/test.mjs'
      - 'test/font/**'
      - '.github/workflows/font_tests.yml'
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: read

jobs:
  test:
    name: Test

    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*]
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    environment: code-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Use Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Fonttools
        run: pip install fonttools

      - name: Run font tests
        run: npx gulp fonttest --headless

      - name: Run font tests with code coverage
        run: npx gulp fonttest --headless --coverage --coverage-output build/coverage/font

      - name: Upload results to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: ./build/coverage/font/lcov.info
          flags: fonttest
          name: codecov-umbrella
          verbose: true
